<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22281c"/>
      <stop offset="100%" stop-color="#1a1e14"/>
    </linearGradient>
    <linearGradient id="cake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3820"/>
      <stop offset="50%" stop-color="#3d2515"/>
      <stop offset="100%" stop-color="#2a1810"/>
    </linearGradient>
    <linearGradient id="frost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b6040"/>
      <stop offset="100%" stop-color="#5a3820"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" rx="16" fill="url(#bg)"/>
  <ellipse cx="200" cy="130" rx="100" ry="20" fill="#d4c3a3" opacity="0.04"/>

  <!-- Cake stand -->
  <ellipse cx="200" cy="175" rx="70" ry="8" fill="#3a3028"/>
  <rect x="196" y="140" width="8" height="35" fill="#4a4038"/>

  <!-- Cake layers -->
  <rect x="140" y="130" width="120" height="18" rx="3" fill="url(#cake)"/>
  <rect x="135" y="112" width="130" height="18" rx="3" fill="url(#frost)"/>
  <rect x="145" y="94" width="110" height="18" rx="3" fill="url(#cake)"/>

  <!-- Frosting drips -->
  <path d="M150 112 Q155 120 150 128" fill="#6b4830"/>
  <path d="M200 112 Q205 122 200 130" fill="#6b4830"/>
  <path d="M250 112 Q255 120 250 128" fill="#6b4830"/>

  <!-- Top decoration -->
  <circle cx="200" cy="88" r="8" fill="#c0392b"/>
  <circle cx="185" cy="92" r="4" fill="#e74c3c"/>
  <circle cx="215" cy="92" r="4" fill="#e74c3c"/>

  <!-- Chocolate shavings -->
  <rect x="160" y="100" width="6" height="2" rx="1" fill="#2a1810" transform="rotate(30 163 101)"/>
  <rect x="230" y="98" width="5" height="2" rx="1" fill="#2a1810" transform="rotate(-20 232 99)"/>

  <text x="200" y="205" text-anchor="middle" fill="#d4c3a3" font-family="Cormorant Garamond, serif" font-size="22" letter-spacing="3" font-weight="600">10%</text>
</svg>
