<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22281c"/>
      <stop offset="100%" stop-color="#1a1e14"/>
    </linearGradient>
    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="100%" stop-color="#c49a28"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ee"/>
      <stop offset="100%" stop-color="#e0d4b0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" rx="16" fill="url(#bg)"/>

  <!-- Three beer mugs -->
  <g>
    <path d="M90 50 L80 170 Q105 178 120 170 L110 50Z" fill="url(#beer)"/>
    <ellipse cx="100" cy="52" rx="14" ry="3.5" fill="url(#foam)"/>
    <ellipse cx="100" cy="62" rx="12" ry="7" fill="#f5edd8"/>
    <path d="M120 68 L132 72 L132 108 L120 104Z" stroke="#d4c3a3" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  <g>
    <path d="M180 45 L170 175 Q195 183 210 175 L200 45Z" fill="url(#beer)"/>
    <ellipse cx="190" cy="47" rx="14" ry="3.5" fill="url(#foam)"/>
    <ellipse cx="190" cy="57" rx="12" ry="7" fill="#f5edd8"/>
    <path d="M210 63 L222 67 L222 103 L210 99Z" stroke="#d4c3a3" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  <g opacity="0.85">
    <path d="M270 50 L260 170 Q285 178 300 170 L290 50Z" fill="url(#beer)"/>
    <ellipse cx="280" cy="52" rx="14" ry="3.5" fill="url(#foam)"/>
    <ellipse cx="280" cy="62" rx="12" ry="7" fill="#f5edd8"/>
    <path d="M300 68 L312 72 L312 108 L300 104Z" stroke="#d4c3a3" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Clink sparkles -->
  <path d="M195 40 L200 30 L205 40" stroke="#d4c3a3" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M285 42 L290 32 L295 42" stroke="#d4c3a3" stroke-width="1" fill="none" opacity="0.4"/>

  <text x="200" y="205" text-anchor="middle" fill="#d4c3a3" font-family="Cormorant Garamond, serif" font-size="20" letter-spacing="2" font-weight="600">2+1=3</text>
</svg>
