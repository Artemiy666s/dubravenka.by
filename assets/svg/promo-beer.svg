<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22281c"/>
      <stop offset="100%" stop-color="#1a1e14"/>
    </linearGradient>
    <linearGradient id="beer1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="100%" stop-color="#c49a28"/>
    </linearGradient>
    <linearGradient id="beer2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a040"/>
      <stop offset="100%" stop-color="#8b6018"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ee"/>
      <stop offset="100%" stop-color="#e0d4b0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" rx="16" fill="url(#bg)"/>
  <!-- Warm light -->
  <ellipse cx="200" cy="120" rx="160" ry="80" fill="#d4c3a3" opacity="0.03"/>

  <!-- Glass 1 - light beer -->
  <path d="M80 40 L70 185 Q95 192 110 185 L100 40Z" fill="url(#beer1)"/>
  <ellipse cx="90" cy="42" rx="16" ry="4" fill="url(#foam)"/>
  <ellipse cx="90" cy="54" rx="14" ry="9" fill="#f5edd8"/>
  <circle cx="84" cy="50" r="3" fill="#fff" opacity="0.4"/>
  <path d="M110 60 L122 64 L122 110 L110 106Z" stroke="#d4c3a3" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Glass 2 - light beer -->
  <path d="M170 35 L160 180 Q185 188 200 180 L190 35Z" fill="url(#beer1)"/>
  <ellipse cx="180" cy="37" rx="16" ry="4" fill="url(#foam)"/>
  <ellipse cx="180" cy="49" rx="14" ry="9" fill="#f5edd8"/>
  <circle cx="174" cy="45" r="3" fill="#fff" opacity="0.35"/>

  <!-- Glass 3 - dark beer -->
  <path d="M260 38 L250 183 Q275 190 290 183 L280 38Z" fill="url(#beer2)"/>
  <ellipse cx="270" cy="40" rx="16" ry="4" fill="url(#foam)"/>
  <ellipse cx="270" cy="52" rx="14" ry="8" fill="#e8dcc0"/>

  <!-- Condensation drops -->
  <circle cx="74" cy="100" r="1.5" fill="#d4c3a3" opacity="0.15"/>
  <circle cx="166" cy="120" r="1.2" fill="#d4c3a3" opacity="0.12"/>
  <circle cx="256" cy="90" r="1.3" fill="#d4c3a3" opacity="0.14"/>

  <!-- Discount badge -->
  <text x="200" y="205" text-anchor="middle" fill="#d4c3a3" font-family="Cormorant Garamond, serif" font-size="22" letter-spacing="4" font-weight="600">−15%</text>
</svg>
