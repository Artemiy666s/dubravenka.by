<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" fill="none">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a5430"/>
      <stop offset="50%" stop-color="#5c3d20"/>
      <stop offset="100%" stop-color="#4a3018"/>
    </linearGradient>
    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c49a20"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ee"/>
      <stop offset="100%" stop-color="#e0d4b0"/>
    </linearGradient>
    <radialGradient id="spot" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2e3428"/>
      <stop offset="100%" stop-color="#1e2218"/>
    </radialGradient>
  </defs>
  <rect width="420" height="240" rx="14" fill="url(#spot)"/>

  <!-- Beer mug background -->
  <path d="M290 20 L278 175 L318 175 L306 20Z" fill="url(#beer)" opacity="0.9"/>
  <ellipse cx="299" cy="22" rx="16" ry="4" fill="url(#foam)"/>
  <ellipse cx="299" cy="32" rx="14" ry="8" fill="#f5edd8" opacity="0.8"/>
  <path d="M318 50 L330 54 L330 100 L318 96Z" stroke="#d4c3a3" stroke-width="1.2" fill="none" opacity="0.6"/>

  <!-- Wooden board -->
  <ellipse cx="175" cy="165" rx="130" ry="52" fill="url(#wood)"/>
  <ellipse cx="175" cy="160" rx="125" ry="48" fill="#6b4a28" opacity="0.5"/>
  <!-- Wood grain -->
  <path d="M80 155 Q130 150 180 158 Q230 165 270 155" stroke="#4a3018" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M90 170 Q140 165 190 172 Q240 178 260 168" stroke="#4a3018" stroke-width="0.5" fill="none" opacity="0.3"/>

  <!-- Fries bundle -->
  <g stroke-linecap="round">
    <line x1="95" y1="120" x2="88" y2="148" stroke="#e8c040" stroke-width="3"/>
    <line x1="105" y1="115" x2="100" y2="146" stroke="#d4a830" stroke-width="2.8"/>
    <line x1="115" y1="118" x2="112" y2="150" stroke="#e8c040" stroke-width="3"/>
    <line x1="125" y1="112" x2="122" y2="145" stroke="#c49a20" stroke-width="2.5"/>
    <line x1="135" y1="116" x2="133" y2="148" stroke="#e8c040" stroke-width="2.8"/>
    <line x1="100" y1="122" x2="96" y2="142" stroke="#d4a830" stroke-width="2"/>
  </g>

  <!-- Onion rings -->
  <circle cx="175" cy="135" r="14" stroke="#d4a040" stroke-width="2.5" fill="none"/>
  <circle cx="175" cy="135" r="9" stroke="#c49030" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="198" cy="128" r="12" stroke="#d4a040" stroke-width="2.5" fill="none"/>
  <circle cx="198" cy="128" r="7.5" stroke="#c49030" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="155" cy="142" r="11" stroke="#d4a040" stroke-width="2" fill="none"/>

  <!-- Cheese sticks -->
  <rect x="210" y="125" width="32" height="9" rx="2" fill="#f0d050" stroke="#c49a20" stroke-width="0.6"/>
  <rect x="215" y="138" width="28" height="8" rx="2" fill="#e8c040" stroke="#c49a20" stroke-width="0.6"/>
  <rect x="212" y="150" width="30" height="7" rx="2" fill="#f0d050" stroke="#c49a20" stroke-width="0.5"/>

  <!-- Croutons / grenki -->
  <rect x="120" y="148" width="14" height="10" rx="2" fill="#c49a30" transform="rotate(-12 127 153)"/>
  <rect x="138" y="152" width="12" height="9" rx="2" fill="#b88a28" transform="rotate(8 144 156)"/>

  <!-- Nuggets -->
  <ellipse cx="230" cy="155" rx="14" ry="10" fill="#c49a28"/>
  <ellipse cx="230" cy="153" rx="11" ry="8" fill="#d4a838"/>
  <ellipse cx="248" cy="148" rx="11" ry="8" fill="#b88a20"/>

  <!-- Sauces -->
  <circle cx="145" cy="168" r="13" fill="#c0392b" opacity="0.85"/>
  <circle cx="145" cy="168" r="9" fill="#e74c3c" opacity="0.4"/>
  <circle cx="195" cy="165" r="11" fill="#f5c842" opacity="0.9"/>
  <circle cx="195" cy="165" r="7" fill="#f0d060" opacity="0.5"/>

  <!-- Smoked cheese wedge -->
  <path d="M100 155 L115 148 L118 162 Z" fill="#e8d8a0" stroke="#c4b070" stroke-width="0.5"/>
</svg>
