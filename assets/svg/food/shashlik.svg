<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="meat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5030"/>
      <stop offset="50%" stop-color="#a06040"/>
      <stop offset="100%" stop-color="#7a4828"/>
    </linearGradient>
    <linearGradient id="char" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3020"/>
      <stop offset="100%" stop-color="#2a1810"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="10" fill="#1a1d14"/>
  <!-- Skewer stick -->
  <line x1="40" y1="18" x2="40" y2="68" stroke="#c4a060" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Meat pieces -->
  <rect x="28" y="24" width="24" height="10" rx="3" fill="url(#meat)" transform="rotate(-2 40 29)"/>
  <rect x="27" y="36" width="26" height="10" rx="3" fill="url(#char)" transform="rotate(1 40 41)"/>
  <rect x="28" y="48" width="24" height="10" rx="3" fill="url(#meat)" transform="rotate(-1 40 53)"/>
  <!-- Grill marks -->
  <line x1="32" y1="27" x2="48" y2="27" stroke="#3a2010" stroke-width="0.8" opacity="0.5"/>
  <line x1="31" y1="39" x2="49" y2="39" stroke="#1a1008" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="51" x2="48" y2="51" stroke="#3a2010" stroke-width="0.8" opacity="0.5"/>
  <!-- Fat glisten -->
  <ellipse cx="36" cy="28" rx="2" ry="1" fill="#d4a080" opacity="0.4"/>
  <ellipse cx="44" cy="52" rx="1.5" ry="0.8" fill="#d4a080" opacity="0.3"/>
</svg>
