<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <radialGradient id="crust" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c49a30"/>
      <stop offset="70%" stop-color="#a07820"/>
      <stop offset="100%" stop-color="#8b6518"/>
    </radialGradient>
    <radialGradient id="sauce" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#8b2518"/>
    </radialGradient>
    <radialGradient id="cheese" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5e8a0"/>
      <stop offset="100%" stop-color="#e8d060"/>
    </radialGradient>
  </defs>
  <rect width="80" height="80" rx="10" fill="#1a1d14"/>
  <!-- Pizza base -->
  <circle cx="40" cy="42" r="30" fill="url(#crust)"/>
  <circle cx="40" cy="42" r="26" fill="url(#sauce)"/>
  <circle cx="40" cy="42" r="24" fill="url(#cheese)" opacity="0.7"/>
  <!-- Pepperoni slices -->
  <ellipse cx="30" cy="34" rx="6" ry="5" fill="#a02020" transform="rotate(-20 30 34)"/>
  <ellipse cx="48" cy="32" rx="5.5" ry="4.5" fill="#b02828" transform="rotate(15 48 32)"/>
  <ellipse cx="38" cy="48" rx="5" ry="4" fill="#902020" transform="rotate(-5 38 48)"/>
  <ellipse cx="52" cy="44" rx="4.5" ry="3.5" fill="#a82828" transform="rotate(25 52 44)"/>
  <ellipse cx="28" cy="46" rx="4" ry="3.5" fill="#b02020" transform="rotate(-30 28 46)"/>
  <!-- Herbs -->
  <circle cx="42" cy="38" r="1" fill="#2d5016" opacity="0.6"/>
  <circle cx="35" cy="42" r="0.8" fill="#2d5016" opacity="0.5"/>
  <!-- Crust edge highlight -->
  <circle cx="40" cy="42" r="30" fill="none" stroke="#d4a830" stroke-width="1" opacity="0.3"/>
</svg>
